[pytest]
# Pytest configuration for InsightSwarm

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --disable-warnings
    --tb=short
    -ra

# Markers
markers =
    integration: Integration tests (require API keys)
    unit: Unit tests (isolated)
    security: Security-focused tests
    slow: Slow tests

# Test timeout (60 seconds per test for integration tests; unit tests should use @pytest.mark.timeout)
timeout = 60

# Minimum Python version
minversion = 3.11

# Report options
console_output_style = progress

# Coverage options (if using pytest-cov)
# [coverage:run]
# omit = */tests/*
