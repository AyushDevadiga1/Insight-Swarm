[pytest]
# Pytest configuration for InsightSwarm

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --disable-warnings
    --tb=short
    -ra

# Exclude scripts/ from test collection — scripts contain runnable tools,
# not test modules. Without this, pytest tries to collect scripts/test_api_keys.py
# and hits a module-name collision with tests/test_api_keys.py.
norecursedirs = .git .venv __pycache__ node_modules .pytest_cache scripts stabilization backups resources assets progress

# Markers
markers =
    integration: Integration tests (require API keys)
    unit: Unit tests (isolated)
    security: Security-focused tests
    slow: Slow tests

# Test timeout (seconds per test)
timeout = 60

# Minimum Python version
minversion = 3.11

# Report options
console_output_style = progress
